<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lista de <th:block th:text="Proyecto + 's'"></th:block></title>
</head>
<body>
    <h1>Lista de <th:block th:text="Proyecto + 's'"></th:block></h1>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                    <th><th:block th:text="id"></th:block></th>
                    <th><th:block th:text="clienteId"></th:block></th>
                    <th><th:block th:text="empleadoId"></th:block></th>
                    <th><th:block th:text="fechaCreacion"></th:block></th>
                    <th><th:block th:text="costo"></th:block></th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="proyecto : proyectos">
                <td><th:block th:text="proyecto.id"></th:block></td>
                    <td><th:block th:text="proyecto[atributo.nombre]"></th:block></td>
                    <td><th:block th:text="proyecto[atributo.nombre]"></th:block></td>
                    <td><th:block th:text="proyecto[atributo.nombre]"></th:block></td>
                    <td><th:block th:text="proyecto[atributo.nombre]"></th:block></td>
                    <td><th:block th:text="proyecto[atributo.nombre]"></th:block></td>
                <td>
                    <a th:href="@{/proyecto/{id}(id=proyecto.id)}">Ver</a>
                    <a th:href="@{/proyecto/editar/{id}(id=proyecto.id)}">Editar</a>
                    <a th:href="@{/proyecto/eliminar/{id}(id=proyecto.id)}">Eliminar</a>
                </td>
            </tr>
        </tbody >
    </table>
    <a th:href="@{/proyecto/crear}">Crear nuevo <th:block th:text="Proyecto"></th:block></a>
</body>
</html>
